<script>
    // 1. Suas configurações (estão corretas!)
    const firebaseConfig = {
      apiKey: "AIzaSyCR9jaBybaf0spwWTS-Pk4IFvVQ9pJPkFk",
      authDomain: "mestre-pro-41d7d.firebaseapp.com",
      projectId: "mestre-pro-41d7d",
      storageBucket: "mestre-pro-41d7d.firebasestorage.app",
      messagingSenderId: "983820072855",
      appId: "1:983820072855:web:9c516274a55457b80ef6d2"
    };

    // 2. Inicialização correta para a versão "Compat"
    // Removemos aquela linha 'const app = initializeApp' que causava o erro
    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    
    const db = firebase.firestore();

    // 3. Função para buscar os dados
    db.collection('dados_api').doc('ligas_futebol').get()
        .then((doc) => {
            if (doc.exists) {
                // Formata o JSON para ficar legível no celular
                document.getElementById('resultado').innerHTML = 
                    "<pre style='white-space: pre-wrap; word-wrap: break-word;'>" + 
                    JSON.stringify(doc.data().conteudo, null, 2) + 
                    "</pre>";
            } else {
                document.getElementById('resultado').innerHTML = "O robô ainda não salvou dados no banco.";
            }
        })
        .catch((error) => {
            console.error("Erro ao carregar:", error);
            document.getElementById('resultado').innerHTML = "Erro: Sem permissão no Firebase (verifique as Rules).";
        });
</script>
