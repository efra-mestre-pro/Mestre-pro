name: Executar Coleta de Dados

on:
  workflow_dispatch: # Isso faz aparecer o botão para você rodar manualmente

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Instalar Node e Rodar Rodo
        run: |
          npm install
          node rodo.js
        env:
          FIREBASE_CONFIG: ${{ secrets.CONFIG_FIREBASE }}
          API_KEY_ESPORTES: ${{ secrets.CHAVE_API_ESPORTES }}
